# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS — main virtual host
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Everything goes through Next.js — including /api/graphql (Phase 3: cookie auth).
    # Next.js extracts the httpOnly auth-token cookie and forwards it as a Bearer
    # header to the API gateway, so /graphql must NOT bypass Next.js.
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Support SSE (streaming feedback, GraphQL subscriptions)
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # Auth routes get a tighter rate limit (still served by Next.js)
    location ~ ^/api/auth {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
