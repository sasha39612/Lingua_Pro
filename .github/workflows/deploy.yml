name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: frontend
            dockerfile: frontend/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=https://${{ vars.DOMAIN }}/graphql
          - service: api-gateway
            dockerfile: backend/api-gateway/Dockerfile
          - service: auth-service
            dockerfile: backend/auth-service/Dockerfile
          - service: text-service
            dockerfile: backend/text-service/Dockerfile
          - service: audio-service
            dockerfile: backend/audio-service/Dockerfile
          - service: stats-service
            dockerfile: backend/stats-service/Dockerfile
          - service: ai-orchestrator
            dockerfile: backend/ai-orchestrator/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image prefix (lowercase)
        id: image
        run: echo "prefix=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}/${{ matrix.service }}:latest
            ${{ steps.image.outputs.prefix }}/${{ matrix.service }}:${{ github.sha }}
          build-args: ${{ matrix.build_args || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,scripts/deploy.sh"
          target: /opt/lingua-pro

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,GITHUB_REPOSITORY,GITHUB_SHA
          script: |
            cd /opt/lingua-pro
            bash scripts/deploy.sh "$GITHUB_SHA"
