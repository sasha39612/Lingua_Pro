name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: frontend
            dockerfile: frontend/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=https://${{ vars.DOMAIN }}/graphql
          - service: api-gateway
            dockerfile: backend/api-gateway/Dockerfile
          - service: auth-service
            dockerfile: backend/auth-service/Dockerfile
          - service: text-service
            dockerfile: backend/text-service/Dockerfile
          - service: audio-service
            dockerfile: backend/audio-service/Dockerfile
          - service: stats-service
            dockerfile: backend/stats-service/Dockerfile
          - service: ai-orchestrator
            dockerfile: backend/ai-orchestrator/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          build-args: ${{ matrix.build_args || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml"
          target: /opt/lingua-pro

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/lingua-pro
            export GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            export GHCR_USER="${{ github.actor }}"
            export GITHUB_REPOSITORY="${{ github.repository }}"
            bash scripts/deploy.sh ${{ github.sha }}
