name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: frontend
            dockerfile: frontend/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=https://${{ vars.DOMAIN }}/graphql
          - service: api-gateway
            dockerfile: backend/api-gateway/Dockerfile
          - service: auth-service
            dockerfile: backend/auth-service/Dockerfile
          - service: text-service
            dockerfile: backend/text-service/Dockerfile
          - service: audio-service
            dockerfile: backend/audio-service/Dockerfile
          - service: stats-service
            dockerfile: backend/stats-service/Dockerfile
          - service: ai-orchestrator
            dockerfile: backend/ai-orchestrator/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image prefix (lowercase)
        id: image
        env:
          REPO: ${{ github.repository }}
        run: echo "prefix=ghcr.io/$(echo "$REPO" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}/${{ matrix.service }}:latest
            ${{ steps.image.outputs.prefix }}/${{ matrix.service }}:${{ github.sha }}
          build-args: ${{ matrix.build_args || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf '%s\n' "${{ secrets.SERVER_HOST_KEY }}" >> ~/.ssh/known_hosts
          printf 'Host *\n  ServerAliveInterval 60\n' > ~/.ssh/config

      - name: Set lowercase repo name
        id: repo
        env:
          REPO: ${{ github.repository }}
        run: echo "name=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Copy compose files to server
        env:
          DEST: "${{ secrets.HETZNER_USER }}@${{ secrets.SERVER_HOST }}"
        run: |
          ssh "$DEST" "mkdir -p /opt/lingua-pro/scripts"
          scp docker-compose.yml docker-compose.prod.yml "$DEST:/opt/lingua-pro/"
          scp scripts/deploy.sh "$DEST:/opt/lingua-pro/scripts/"

      - name: Deploy on server
        env:
          DEST: "${{ secrets.HETZNER_USER }}@${{ secrets.SERVER_HOST }}"
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GH_REPO: ${{ steps.repo.outputs.name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          {
            printf 'export GHCR_TOKEN=%q\n'          "$GHCR_TOKEN"
            printf 'export GHCR_USER=%q\n'           "$GHCR_USER"
            printf 'export GITHUB_REPOSITORY=%q\n'   "$GH_REPO"
            printf 'export PATH=$PATH:/usr/local/bin\n'
            printf 'cd /opt/lingua-pro\n'
            printf 'bash scripts/deploy.sh %q\n'     "$GIT_SHA"
          } | ssh "$DEST" bash
