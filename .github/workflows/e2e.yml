name: E2E Tests (Playwright)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      COMPOSE_PROJECT_NAME: lingua-pro

    steps:
      - uses: actions/checkout@v4

      # ── Environment ──────────────────────────────────────────────────────────
      # Write a .env file with safe test-only values.
      # AI_API_KEY is intentionally blank — ai-orchestrator uses local fallbacks.
      - name: Write .env
        run: |
          {
            echo "POSTGRES_USER=lingua"
            echo "POSTGRES_PASSWORD=e2etestpassword"
            echo "DATABASE_URL_AUTH=postgresql://lingua:e2etestpassword@postgres:5432/auth_db"
            echo "DATABASE_URL_TEXT=postgresql://lingua:e2etestpassword@postgres:5432/text_db"
            echo "DATABASE_URL_AUDIO=postgresql://lingua:e2etestpassword@postgres:5432/audio_db"
            echo "JWT_SECRET=e2e-test-jwt-secret-minimum-32-chars"
            echo "JWT_EXPIRY=1d"
            echo "AI_API_KEY="
          } > .env

      # ── Docker ───────────────────────────────────────────────────────────────
      # BuildKit is required for layer caching; setup-buildx-action installs it
      # as the default builder and enables the GitHub Actions cache backend.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build all service images (parallel within compose) then start them.
      # --wait blocks until every service with a healthcheck reports healthy.
      - name: Build and start services
        run: docker compose up -d --build --wait
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"

      # ── Shell smoke test ─────────────────────────────────────────────────────
      # Runs before Playwright — fails fast if basic API plumbing is broken.
      - name: Run shell smoke test
        run: bash scripts/e2e-test.sh
        env:
          GW_URL: http://localhost:8080
          AUTH_URL: http://localhost:4001
          TEXT_URL: http://localhost:4002
          AUDIO_URL: http://localhost:4003
          STATS_URL: http://localhost:4004
          AI_URL: http://localhost:4005
          FE_URL: http://localhost:3000

      - name: Show container logs on smoke failure
        if: failure()
        run: docker compose logs --tail=100

      # ── Node / pnpm ──────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Playwright ───────────────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: pnpm --filter frontend exec playwright install chromium --with-deps

      - name: Run Playwright tests
        run: pnpm --filter frontend e2e
        env:
          CI: "true"

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload test results (failures only)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7

      # Helpful context when something goes wrong
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail=100
