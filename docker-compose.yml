# docker-compose configuration for Lingua Pro — Language Training Platform
# Stack: Next.js + React (frontend) | NestJS + Node.js (microservices) | PostgreSQL + Prisma
# Deployment: Hetzner cloud via Docker + Docker Compose
# Note: all services are expected to supply a Dockerfile from day one.  
# For deployment on Hetzner, images can be built locally and pushed to a
# registry accessible from the Hetzner cloud, or the compose file can be
# used with `docker-compose` on a Hetzner VM (hcloud) directly.
# Replace build contexts with image names when deploying to Hetzner.

version: '3.8'

services:
  # frontend service (Next.js)
  frontend:
    build: ./frontend       # or use an image registry.example.com/lingua/frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:3000/health || exit 1"]
    depends_on:
      - api-gateway
    networks:
      - lingua-network

  # api-gateway service (GraphQL endpoint + routing)
  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:8080/health || exit 1"]
    depends_on:
      - auth-service
      - text-service
      - audio-service
      - stats-service
      - ai-orchestrator
    networks:
      - lingua-network

  auth-service:
    build: ./backend/auth-service
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:4001/health || exit 1"]
    networks:
      - lingua-network

  text-service:
    build: ./backend/text-service
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:4002/health || exit 1"]
    networks:
      - lingua-network

  audio-service:
    build: ./backend/audio-service
    environment:
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - audio_data:/var/app/uploads   # container path for audio/text files
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:4003/health || exit 1"]
    networks:
      - lingua-network

  stats-service:
    build: ./backend/stats-service
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:4004/health || exit 1"]
    networks:
      - lingua-network

  ai-orchestrator:
    build: ./backend/ai-orchestrator
    environment:
      - AI_API_KEY=${AI_API_KEY}
    healthcheck:
      test: ["CMD-SHELL","curl -f http://localhost:4005/health || exit 1"]
    networks:
      - lingua-network

  postgres:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-english_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER}"]
    networks:
      - lingua-network

# shared volumes for persistence
volumes:
  postgres_data:
  audio_data:   # persistent storage for user audio/text uploads
  # add other named volumes if needed

# Note: each service directory must include its own Dockerfile at the root
# (e.g. frontend/Dockerfile, backend/auth-service/Dockerfile, etc.).

# internal network for service-to-service communication
networks:
  lingua-network:
    driver: bridge

# NOTES:
# - Create a .env file in the root with: POSTGRES_USER, POSTGRES_PASSWORD,
#   POSTGRES_DB, AI_API_KEY, JWT_SECRET. Services reference these variables.
# - Healthchecks allow monitoring and automated restarts on failure.
# - On Hetzner, run: docker-compose up -d to start the entire stack.
# - CI/CD pipelines build images, push to a registry, then SSH into Hetzner
#   and run: docker-compose pull && docker-compose up -d to deploy.
# - All services must expose a /health endpoint (checked via healthcheck directives).
# - Use named volumes (e.g., postgres_data) to persist data across restarts.
# - Frontend: Next.js 15+ (latest stable), React 18+, TypeScript (strict)
# - Backend services: Node.js 18+, NestJS, TypeScript (strict)
# - Database: PostgreSQL 15+ with Prisma ORM and multi-language support
# - Networking: lingua-network Docker bridge for internal service communication
