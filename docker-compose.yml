version: '3.8'

# All services use context: . (monorepo root) because pnpm-lock.yaml lives there.
# Each Dockerfile is a multi-stage build: builder (install + compile) → runner (lean image).
# Each service connects to its own database (auth_db / text_db / audio_db).
# Deploy on Hetzner: docker-compose up -d
# Update: docker-compose pull && docker-compose up -d

services:

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api-gateway:8080/graphql
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lingua-network

  # ── API Gateway ───────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:4001/graphql
      - TEXT_SERVICE_URL=http://text-service:4002/graphql
      - AI_ORCHESTRATOR_URL=http://ai-orchestrator:4005
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      auth-service:
        condition: service_healthy
      text-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lingua-network

  # ── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    ports:
      - "127.0.0.1:4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - DATABASE_URL=${DATABASE_URL_AUTH}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-7d}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lingua-network

  # ── Text Service ──────────────────────────────────────────────────────────
  text-service:
    build:
      context: .
      dockerfile: backend/text-service/Dockerfile
    ports:
      - "127.0.0.1:4002:4002"
    environment:
      - NODE_ENV=production
      - PORT=4002
      - DATABASE_URL=${DATABASE_URL_TEXT}
      - AI_ORCHESTRATOR_URL=http://ai-orchestrator:4005
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      ai-orchestrator:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lingua-network

  # ── Audio Service ─────────────────────────────────────────────────────────
  audio-service:
    build:
      context: .
      dockerfile: backend/audio-service/Dockerfile
    ports:
      - "127.0.0.1:4003:4003"
    environment:
      - NODE_ENV=production
      - PORT=4003
      - DATABASE_URL=${DATABASE_URL_AUDIO}
      - AI_ORCHESTRATOR_URL=http://ai-orchestrator:4005
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - audio_data:/var/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      ai-orchestrator:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lingua-network

  # ── Stats Service ─────────────────────────────────────────────────────────
  # No database — aggregates data by calling text-service and audio-service REST APIs
  stats-service:
    build:
      context: .
      dockerfile: backend/stats-service/Dockerfile
    ports:
      - "127.0.0.1:4004:4004"
    environment:
      - NODE_ENV=production
      - PORT=4004
      - TEXT_SERVICE_URL=http://text-service:4002
      - AUDIO_SERVICE_URL=http://audio-service:4003
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      text-service:
        condition: service_healthy
      audio-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lingua-network

  # ── AI Orchestrator ───────────────────────────────────────────────────────
  ai-orchestrator:
    build:
      context: .
      dockerfile: backend/ai-orchestrator/Dockerfile
    ports:
      - "127.0.0.1:4005:4005"
    environment:
      - NODE_ENV=production
      - PORT=4005
      - AI_API_KEY=${AI_API_KEY}
      - OPENAI_TEXT_MODEL=${OPENAI_TEXT_MODEL:-gpt-4o-mini}
      - OPENAI_TASK_MODEL=${OPENAI_TASK_MODEL:-gpt-4o-mini}
      - OPENAI_EVAL_MODEL=${OPENAI_EVAL_MODEL:-gpt-4o-mini}
      - OPENAI_TRANSCRIPTION_MODEL=${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - lingua-network

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=lingua_admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d lingua_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lingua-network

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  audio_data:

# ── Network ───────────────────────────────────────────────────────────────
networks:
  lingua-network:
    driver: bridge
